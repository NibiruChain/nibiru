syntax = "proto3";

package ibc.applications.transfer.v1;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/NibiruChain/nibiru/v2/lib/ibc-go/modules/apps/transfer/types";

// Allocation defines the spend limit for a particular port and channel
message Allocation {
  // the port on which the packet will be sent
  string source_port = 1 [(gogoproto.moretags) = "yaml:\"source_port\""];
  // the channel by which the packet will be sent
  string source_channel = 2 [(gogoproto.moretags) = "yaml:\"source_channel\""];
  // spend limitation on the channel
  repeated cosmos.base.v1beta1.Coin spend_limit = 3 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/NibiruChain/nibiru/v2/lib/cosmos-sdk/types.Coins"
  ];
  // allow list of receivers, an empty allow list permits any receiver address
  repeated string allow_list = 4;
  // allow list of memo strings, an empty list prohibits all memo strings;
  // a list only with "*" permits any memo string
  repeated string allowed_packet_data = 5;
}

// TransferAuthorization allows the grantee to spend up to spend_limit coins from
// the granter's account for ibc transfer on a specific channel
message TransferAuthorization {
  option (cosmos_proto.implements_interface) = "cosmos.authz.v1beta1.Authorization";

  // port and channel amounts
  repeated Allocation allocations = 1 [(gogoproto.nullable) = false];
}
