name: "Wasm VM FFI"
# Builds release candidate libwasmvm artifacts on ordinary branch and PR runs.
# Durable GitHub Release publishing only runs for lib/wasmvm version tags.

on:
  push:
    branches:
      - main
    tags:
      - "lib/wasmvm/v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # changes-wasmvm (job): Detects changes that should run Wasm VM FFI jobs.
  changes-wasmvm:
    runs-on: ubuntu-latest
    outputs:
      has-changes-for-wasmvm: ${{ steps.filter.outputs.wasmvm }}
      do-run: ${{ steps.decision.outputs['do-run'] }}
      do-release: ${{ steps.decision.outputs['do-release'] }}
      reason: ${{ steps.decision.outputs.reason }}
    steps:
      - uses: actions/checkout@v7

      - name: Check for Wasm VM FFI changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            wasmvm:
              - "lib/wasmvm/**"
              - ".github/workflows/wasmvm.yml"

      # The path filter controls ordinary PR runs, while workflow dispatch and
      # push events force the jobs to execute. Only matching version-tag pushes
      # may publish a release.
      - name: Decide Wasm VM FFI run mode
        id: decision
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref }}
          HAS_CHANGES_FOR_WASMVM: ${{ steps.filter.outputs.wasmvm }}
        run: |
          set -euo pipefail

          do_run=false
          do_release=false
          reason="No Wasm VM FFI changes detected."

          if [[ "$HAS_CHANGES_FOR_WASMVM" == "true" ]]; then
            do_run=true
            reason="Wasm VM FFI changes detected."
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            do_run=true
            reason="Manual workflow dispatch runs Wasm VM FFI jobs."
          elif [[ "$EVENT_NAME" == "push" ]]; then
            do_run=true
            reason="Push events run Wasm VM FFI jobs."
          fi

          if [[ "$EVENT_NAME" == "push" && "$REF_NAME" =~ ^refs/tags/lib/wasmvm/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            do_release=true
            reason="Wasm VM FFI version tag push runs release publishing."
          fi

          {
            echo "do-run=$do_run"
            echo "do-release=$do_release"
            echo "reason=$reason"
          } >> "$GITHUB_OUTPUT"

  # rust-base-tests (job): Tests the Rust crate `wasmvm`, generated bindings,
  # and Rust docs.
  rust-base-tests:
    needs: changes-wasmvm
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: skip-rust-base-tests
        if: ${{ needs.changes-wasmvm.outputs['do-run'] != 'true' }}
        run: |
          echo "job: rust-base-tests was skipped. ${{ needs.changes-wasmvm.outputs.reason }}"

      - uses: actions/checkout@v7
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}

      - name: Install Rust
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install just
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: taiki-e/install-action@just

      - name: Cache Cargo
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        id: rust-cache-wasmvm
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lib/wasmvm/libwasmvm/target/
          key: ${{ runner.os }}-cargo-wasmvm-${{ hashFiles('lib/wasmvm/libwasmvm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasmvm-

      - name: Run Rust sanity checks
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm ci-rust

  # rust-lint (job): Runs Rust linting for crate `wasmvm` with Clippy.
  rust-lint:
    needs: changes-wasmvm
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: skip-rust-lint
        if: ${{ needs.changes-wasmvm.outputs['do-run'] != 'true' }}
        run: |
          echo "job: rust-lint was skipped. ${{ needs.changes-wasmvm.outputs.reason }}"

      - uses: actions/checkout@v7
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}

      - name: Install Rust
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install just
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: taiki-e/install-action@just

      - name: Cache Cargo
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        id: rust-cache-wasmvm
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lib/wasmvm/libwasmvm/target/
          key: ${{ runner.os }}-cargo-wasmvm-${{ hashFiles('lib/wasmvm/libwasmvm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasmvm-

      - name: Run Clippy
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm clippy

  # go-base-tests (job): Tests Go formatting, module tidiness, shell scripts,
  # and no-CGO builds.
  go-base-tests:
    needs: changes-wasmvm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: skip-go-base-tests
        if: ${{ needs.changes-wasmvm.outputs['do-run'] != 'true' }}
        run: |
          echo "job: go-base-tests was skipped. ${{ needs.changes-wasmvm.outputs.reason }}"

      - uses: actions/checkout@v7
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}

      - name: Install Go
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version: 1.19.7
          cache: true

      - name: Install just
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: taiki-e/install-action@just

      - name: Install Go and shell tools
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: |
          go install mvdan.cc/gofumpt@v0.4.0
          GO111MODULE=on go install mvdan.cc/sh/v3/cmd/shfmt@v3.7.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y shellcheck

      - name: Run Go checks
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm ci-go

      - name: Run script checks
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm ci-scripts

  # go-lint (job): Runs Go linting for module `github.com/CosmWasm/wasmvm`.
  go-lint:
    needs: changes-wasmvm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: skip-go-lint
        if: ${{ needs.changes-wasmvm.outputs['do-run'] != 'true' }}
        run: |
          echo "job: go-lint was skipped. ${{ needs.changes-wasmvm.outputs.reason }}"

      - uses: actions/checkout@v7
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}

      - name: Install just
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: taiki-e/install-action@just

      - name: Run golangci-lint
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm lint-go --fix=false

  # go-ffi-tests (job): Tests the Go-to-Rust FFI path after rebuilding shared
  # library `libwasmvm`.
  go-ffi-tests:
    needs: changes-wasmvm
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: skip-go-ffi-tests
        if: ${{ needs.changes-wasmvm.outputs['do-run'] != 'true' }}
        run: |
          echo "job: go-ffi-tests was skipped. ${{ needs.changes-wasmvm.outputs.reason }}"

      - uses: actions/checkout@v7
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}

      - name: Install Rust
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version: 1.19.7
          cache: true

      - name: Install just
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: taiki-e/install-action@just

      - name: Cache Cargo
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        id: rust-cache-wasmvm
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            lib/wasmvm/libwasmvm/target/
          key: ${{ runner.os }}-cargo-wasmvm-${{ hashFiles('lib/wasmvm/libwasmvm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasmvm-

      - name: Build Rust shared library
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm build-rust

      - name: Run Go tests
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm test-go

      - name: Run Go race-safety tests
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm test-go-safety

      - name: Build Go packages
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm build-go

  # rust-cargo-audit (job): Audits Rust dependencies for crate `wasmvm` when
  # enabled by repository vars.
  # TODO: Enable this as a scheduled or advisory security workflow if dependency
  # vulnerability visibility becomes useful for this fork.
  rust-cargo-audit:
    needs: changes-wasmvm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: skip-rust-cargo-audit
        if: ${{ vars.ENABLE_CARGO_AUDIT != 'true' || needs.changes-wasmvm.outputs['do-run'] != 'true' }}
        run: |
          echo "job: rust-cargo-audit was skipped. ENABLE_CARGO_AUDIT=${{ vars.ENABLE_CARGO_AUDIT }}. ${{ needs.changes-wasmvm.outputs.reason }}"

      - uses: actions/checkout@v7
        if: ${{ vars.ENABLE_CARGO_AUDIT == 'true' && needs.changes-wasmvm.outputs['do-run'] == 'true' }}

      - name: Install Rust
        if: ${{ vars.ENABLE_CARGO_AUDIT == 'true' && needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        if: ${{ vars.ENABLE_CARGO_AUDIT == 'true' && needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: cargo install --debug cargo-audit --version 0.21.0 --locked

      - name: Run cargo audit
        if: ${{ vars.ENABLE_CARGO_AUDIT == 'true' && needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm audit

  # rust-sanity-windows (job): Tests crate `wasmvm` on Windows when enabled by
  # repository vars.
  # TODO: Enable this if Windows Rust support matters for future artifact or
  # consumer workflows. The Nibiru release path currently validates Linux only.
  # ```
  # rust-sanity-windows:
  #   name: Windows Rust sanity
  #   runs-on: windows-latest
  #   timeout-minutes: 45
  #   defaults:
  #     run:
  #       shell: bash
  #   steps:
  #     - uses: actions/checkout@v7
  #       if: ${{ vars.ENABLE_WINDOWS_RUST_SANITY == 'true' }}
  #
  #     - name: Install Rust
  #       if: ${{ vars.ENABLE_WINDOWS_RUST_SANITY == 'true' }}
  #       uses: dtolnay/rust-toolchain@stable
  #
  #     - name: Run Rust unit tests
  #       if: ${{ vars.ENABLE_WINDOWS_RUST_SANITY == 'true' }}
  #       working-directory: lib/wasmvm/libwasmvm
  #       run: cargo test
  # ```

  # build-libwasmvm-static-musl (job): Builds Linux musl static library artifacts for
  # `libwasmvm`.
  build-libwasmvm-static-musl:
    needs:
      - changes-wasmvm
      - rust-base-tests
      - go-base-tests
      - go-ffi-tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: skip-build-libwasmvm-static-musl
        if: ${{ needs.changes-wasmvm.outputs['do-run'] != 'true' }}
        run: |
          echo "job: build-libwasmvm-static-musl was skipped. ${{ needs.changes-wasmvm.outputs.reason }}"

      - uses: actions/checkout@v7
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}

      - name: Install just
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: taiki-e/install-action@just

      - name: Build static builder image
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm docker-image-static

      - name: Build static musl libraries
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm artifact-static

      - name: Collect static artifacts
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: |
          mkdir -p artifacts/static-musl
          cp lib/wasmvm/internal/api/libwasmvm_muslc.a artifacts/static-musl/libwasmvm_muslc.x86_64.a
          cp lib/wasmvm/internal/api/libwasmvm_muslc.aarch64.a artifacts/static-musl/
          (cd artifacts/static-musl && sha256sum -- libwasmvm_muslc.x86_64.a libwasmvm_muslc.aarch64.a > checksums.txt && cat checksums.txt)

      - name: Upload musl static libraries
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: libwasmvm-muslc
          path: |
            artifacts/static-musl/libwasmvm_muslc.x86_64.a
            artifacts/static-musl/libwasmvm_muslc.aarch64.a
            artifacts/static-musl/checksums.txt
          if-no-files-found: error

  # test-go-alpine-musl (job): Tests Go packages against the musl static
  # `libwasmvm` artifacts in Alpine.
  # TODO: Enable this when static musl Go consumer tests are worth the runtime
  # cost. This is stronger than building artifacts because it exercises the Go
  # packages with tag `muslc` inside Alpine.
  test-go-alpine-musl:
    needs: changes-wasmvm
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: skip-test-go-alpine-musl
        if: ${{ vars.ENABLE_ALPINE_MUSLC_GO_TESTS != 'true' || needs.changes-wasmvm.outputs['do-run'] != 'true' }}
        run: |
          echo "job: test-go-alpine-musl was skipped. ENABLE_ALPINE_MUSLC_GO_TESTS=${{ vars.ENABLE_ALPINE_MUSLC_GO_TESTS }}. ${{ needs.changes-wasmvm.outputs.reason }}"

      - uses: actions/checkout@v7
        if: ${{ vars.ENABLE_ALPINE_MUSLC_GO_TESTS == 'true' && needs.changes-wasmvm.outputs['do-run'] == 'true' }}

      - name: Build static musl library and run Alpine Go tests
        if: ${{ vars.ENABLE_ALPINE_MUSLC_GO_TESTS == 'true' && needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm test-alpine

  # build-libwasmvm-shared-linux (job): Builds Linux glibc shared library artifacts for
  # `libwasmvm`.
  build-libwasmvm-shared-linux:
    needs:
      - changes-wasmvm
      - rust-base-tests
      - go-base-tests
      - go-ffi-tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: skip-build-libwasmvm-shared-linux
        if: ${{ needs.changes-wasmvm.outputs['do-run'] != 'true' }}
        run: |
          echo "job: build-libwasmvm-shared-linux was skipped. ${{ needs.changes-wasmvm.outputs.reason }}"

      - uses: actions/checkout@v7
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}

      - name: Install just
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: taiki-e/install-action@just

      - name: Build Linux builder image
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm docker-image-linux

      - name: Build Linux shared libraries
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm artifact-linux

      - name: Collect Linux shared artifacts
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: |
          mkdir -p artifacts/linux-shared
          cp lib/wasmvm/internal/api/libwasmvm.x86_64.so artifacts/linux-shared/
          cp lib/wasmvm/internal/api/libwasmvm.aarch64.so artifacts/linux-shared/
          (cd artifacts/linux-shared && sha256sum -- libwasmvm.aarch64.so libwasmvm.x86_64.so > checksums.txt && cat checksums.txt)

      - name: Upload Linux shared libraries
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: libwasmvm-glibc
          path: |
            artifacts/linux-shared/libwasmvm.x86_64.so
            artifacts/linux-shared/libwasmvm.aarch64.so
            artifacts/linux-shared/checksums.txt
          if-no-files-found: error

  # build-libwasmvm-darwin (job): Builds Darwin shared and static library
  # artifacts for `libwasmvm`.
  build-libwasmvm-darwin:
    needs:
      - changes-wasmvm
      - rust-base-tests
      - go-base-tests
      - go-ffi-tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: skip-build-libwasmvm-darwin
        if: ${{ needs.changes-wasmvm.outputs['do-run'] != 'true' }}
        run: |
          echo "job: build-libwasmvm-darwin was skipped. ${{ needs.changes-wasmvm.outputs.reason }}"

      - uses: actions/checkout@v7
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}

      - name: Install just
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: taiki-e/install-action@just

      - name: Build Darwin builder image
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm docker-image-cross

      - name: Build Darwin libraries
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: just wasmvm artifact-darwin

      - name: Collect Darwin artifacts
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        run: |
          mkdir -p artifacts/darwin
          cp lib/wasmvm/internal/api/libwasmvm.dylib artifacts/darwin/
          cp lib/wasmvm/internal/api/libwasmvmstatic_darwin.a artifacts/darwin/
          (cd artifacts/darwin && sha256sum -- libwasmvm.dylib libwasmvmstatic_darwin.a > checksums.txt && cat checksums.txt)

      - name: Upload Darwin libraries
        if: ${{ needs.changes-wasmvm.outputs['do-run'] == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: libwasmvm-darwin
          path: |
            artifacts/darwin/libwasmvm.dylib
            artifacts/darwin/libwasmvmstatic_darwin.a
            artifacts/darwin/checksums.txt
          if-no-files-found: error

  # publish-libwasmvm-release (job): Publishes tested `libwasmvm` artifacts to a
  # GitHub Release.
  publish-libwasmvm-release:
    needs:
      - changes-wasmvm
      - build-libwasmvm-static-musl
      - build-libwasmvm-shared-linux
      - build-libwasmvm-darwin
    if: ${{ needs.changes-wasmvm.outputs['do-release'] == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-publish-libwasmvm-release-${{ github.ref }}
      cancel-in-progress: true
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout pushed tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Verify tag commit is reachable from main
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main
          tag_commit="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "${GITHUB_REF_NAME} (${tag_commit}) is not reachable from origin/main." >&2
            exit 1
          fi

      - name: Use tested commit as local main branch
        run: git checkout -B main "${GITHUB_REF_NAME}^{commit}"

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Download tested musl artifacts
        uses: actions/download-artifact@v8
        with:
          name: libwasmvm-muslc
          path: dist/libwasmvm

      - name: Download tested glibc artifacts
        uses: actions/download-artifact@v8
        with:
          name: libwasmvm-glibc
          path: dist/libwasmvm

      - name: Download tested Darwin artifacts
        uses: actions/download-artifact@v8
        with:
          name: libwasmvm-darwin
          path: dist/libwasmvm

      - name: Collect libwasmvm release artifacts
        run: |
          mkdir -p dist/libwasmvm
          find dist/libwasmvm -mindepth 2 -type f -name 'libwasmvm*' \
            -exec cp -t dist/libwasmvm {} +

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Test release script
        run: just wasmvm release test

      - name: Publish tested libwasmvm release
        run: just wasmvm release publish "$GITHUB_REF_NAME" --run
