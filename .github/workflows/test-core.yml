name: "Core Tests"

on:
  workflow_dispatch: # Runs on manual calls
  schedule:
    - cron: "0 0 * * *" # Runs automatically every day
  push:
    branches: ["main"]
  pull_request:

# Allow concurrent runs on main/release branches but isolates other branches
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ ! (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) }}

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: "Check for Go-related changes"
        id: check_nibiru_go
        uses: dorny/paths-filter@v4
        with:
          filters: |
            nibiru-go:
              - "app/**/*.go"
              - "cmd/**/*.go"
              - "eth/**/*.go"
              - "evm/**/*.go"
              - "gosdk/**/*.go"
              - "x/**/*.go"
              - "**/*.proto"
              - "go.mod"
              - "go.sum"
              - "contrib/docker-compose/*"

      - name: skip-tests
        if: steps.check_nibiru_go.outputs.nibiru-go == 'false'
        run: |
          echo "job: unit-tests was skipped since Nibiru Golang files were not changed."

      - name: "Set up Go"
        if: steps.check_nibiru_go.outputs.nibiru-go == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # cache: "The action has a built-in functionality for caching and
          # restoring go modules and build outputs. It uses [actions/cache@v4]."
          # - Handles go module cache (go env GOMODCACHE).
          # - Handles go build cache (go env GOCACHE).
          cache: true

      - name: "Install just"
        if: steps.check_nibiru_go.outputs.nibiru-go == 'true'
        # casey/just: https://just.systems/man/en/chapter_6.html
        # taiki-e/install-action: https://github.com/taiki-e/install-action
        uses: taiki-e/install-action@just

      - name: Run all unit tests.
        if: steps.check_nibiru_go.outputs.nibiru-go == 'true'
        run: just test-unit

  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: "Check for Go-related changes"
        id: check_nibiru_go
        uses: dorny/paths-filter@v4
        with:
          filters: |
            nibiru-go:
              - "app/**/*.go"
              - "cmd/**/*.go"
              - "eth/**/*.go"
              - "evm/**/*.go"
              - "gosdk/**/*.go"
              - "x/**/*.go"
              - "**/*.proto"
              - "go.mod"
              - "go.sum"
              - "contrib/docker-compose/*"

      - uses: actions/setup-go@v6
        if: steps.check_nibiru_go.outputs.nibiru-go == 'true'
        with:
          go-version-file: go.mod
          # cache: "The action has a built-in functionality for caching and
          # restoring go modules and build outputs. It uses [actions/cache@v4]."
          # - Handles go module cache (go env GOMODCACHE).
          # - Handles go build cache (go env GOCACHE).
          cache: true # Note that golangci-lint action already caches for us (https://github.com/golangci/golangci-lint-action#performance)

      - name: golangci-lint
        if: steps.check_nibiru_go.outputs.nibiru-go == 'true'
        uses: golangci/golangci-lint-action@v9
        with:
          # Optional: version of golangci-lint to use in form of v1.2 or v1.2.3 or `latest` to use the latest version
          version: v2.6.1

          # Optional: working directory, useful for monorepos
          # working-directory: somedir

          # Optional: golangci-lint command line arguments.
          args: --fix=false

          # Optional: show only new issues if it's a pull request. The default value is `false`.
          # only-new-issues: true

          # Optional: if set to true then the all caching functionality will be
          #   completely disabled. Takes precedence over all other caching options.
          skip-cache: false

          # Optional: if set to true then the action won't cache or restore ~/go/pkg.
          # skip-pkg-cache: true

          # Optional: if set to true then the action won't cache or restore ~/.cache/go-build.
          # skip-build-cache: true

  check-nibiru-go:
    runs-on: ubuntu-latest
    outputs:
      nibiru-go: ${{ steps.check_nibiru_go.outputs.nibiru-go }}
    steps:
      - uses: actions/checkout@v7

      - name: "Check for Go-related changes"
        id: check_nibiru_go
        uses: dorny/paths-filter@v4
        with:
          filters: |
            nibiru-go:
              - "app/**/*.go"
              - "cmd/**/*.go"
              - "eth/**/*.go"
              - "evm/**/*.go"
              - "gosdk/**/*.go"
              - "x/**/*.go"
              - "**/*.proto"
              - "go.mod"
              - "go.sum"
              - "contrib/docker-compose/*"
              - "contrib/scripts/build-nibiru.sh"
              - "cmd/nibid/localnet.sh"
              - "Dockerfile"
              - "justfile"
              - ".github/workflows/test-core.yml"

      - name: skip-build
        if: steps.check_nibiru_go.outputs.nibiru-go == 'false'
        run: |
          echo "Nibiru Golang files were not changed."

  build:
    needs: check-nibiru-go
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - name: skip-build
        if: needs.check-nibiru-go.outputs.nibiru-go == 'false'
        run: |
          echo "job: build was skipped since Nibiru Golang files were not changed."

      - uses: actions/checkout@v7
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'

      - name: "Set up Go"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: "Build the nibid binary"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        run: |
          contrib/scripts/build-nibiru.sh --run --just-build

      - name: "Verify nibid binary"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        run: |
          test -x build/nibid
          build/nibid version

      - name: "Upload nibid artifact"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true' && matrix.runner == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: nibid-linux-amd64
          path: build/nibid
          if-no-files-found: error

  localnet-scripts:
    needs: [check-nibiru-go, build]
    runs-on: ubuntu-latest
    steps:
      - name: skip-localnet-scripts
        if: needs.check-nibiru-go.outputs.nibiru-go != 'true'
        run: |
          echo "job: localnet-scripts was skipped since Nibiru Golang files were not changed."

      - uses: actions/checkout@v7
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'

      - name: "Install just"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        # casey/just: https://just.systems/man/en/chapter_6.html
        # taiki-e/install-action: https://github.com/taiki-e/install-action
        uses: taiki-e/install-action@just

      - name: "Download nibid artifact"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        uses: actions/download-artifact@v8
        with:
          name: nibid-linux-amd64
          path: dist

      - name: "Install nibid artifact"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        run: |
          sudo install -m 0755 dist/nibid /usr/local/bin/nibid
          nibid version

      - name: "Run scripts/chaosnet.sh (Used in Docker image)"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        run: |
          just test-chaosnet

      - name: "Run cmd/nibid/localnet.sh"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        run: |
          just localnet --no-build &
          pid_localnet=$!
          sleep 8
          nibid_pid="$(pgrep -x nibid)"
          kill "$nibid_pid"
          wait "$pid_localnet" || true

  heavy-tests:
    # Job that runs all tests and publishes code coverage reports.
    needs: [check-nibiru-go, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: skip-heavy-tests
        if: needs.check-nibiru-go.outputs.nibiru-go != 'true'
        run: |
          echo "job: heavy-tests was skipped since Nibiru Golang files were not changed."

      - uses: actions/checkout@v7
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'

      - name: "Set up Go"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # cache: "The action has a built-in functionality for caching and
          # restoring go modules and build outputs. It uses [actions/cache@v4]."
          # - Handles go module cache (go env GOMODCACHE).
          # - Handles go build cache (go env GOCACHE).
          cache: true

      - name: "Install just"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        # casey/just: https://just.systems/man/en/chapter_6.html
        # taiki-e/install-action: https://github.com/taiki-e/install-action
        uses: taiki-e/install-action@just

      - name: "Download nibid artifact"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        uses: actions/download-artifact@v8
        with:
          name: nibid-linux-amd64
          path: dist

      - name: "Install nibid artifact"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        run: |
          sudo install -m 0755 dist/nibid /usr/local/bin/nibid
          nibid version

      - name: "Launch localnet"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        run: |
          (set -o pipefail; just localnet --no-build 2>&1 | tee log-localnet.txt) &
          pid_localnet=$!
          # EVM JSON-RPC (:8545) benchmarked at 20s to become ready in CI;
          # sleep 22s to keep a small stability buffer and reduce startup races.
          # check after 10s so startup failures fail this step instead of surfacing
          # later as test connection errors.
          sleep 10
          if ! kill -0 "$pid_localnet" 2>/dev/null || ! pgrep -x nibid >/dev/null; then
            echo "localnet failed to stay running during startup"
            cat log-localnet.txt
            exit 1
          fi

          echo "Localnet is running in the background { pid=$pid_localnet }"
          sleep 12

      - name: "Run all tests."
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        run: just test-cover

      - name: "Upload coverage reports to Codecov"
        if: needs.check-nibiru-go.outputs.nibiru-go == 'true'
        uses: codecov/codecov-action@v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        # Docs on usable "with" flags for codecov/codecov-action v5:
        # https://github.com/codecov/codecov-action?tab=readme-ov-file#example-workflowyml-with-codecov-action
        with:
          disable_search: true
          files: coverage.out

  # proto-gen-rs: Tests the script that generates protobuf bindings in Rust
  proto-gen-rs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: "Check for Go-related changes"
        id: check_nibiru_go
        uses: dorny/paths-filter@v4
        with:
          filters: |
            nibiru-go:
              - "app/**/*.go"
              - "cmd/**/*.go"
              - "eth/**/*.go"
              - "evm/**/*.go"
              - "gosdk/**/*.go"
              - "x/**/*.go"
              - "**/*.proto"
              - "go.mod"
              - "go.sum"
              - "contrib/docker-compose/*"

      - name: skip-tests
        if: steps.check_nibiru_go.outputs.nibiru-go == 'false'
        run: |
          echo "job: proto-gen-rs was skipped since Nibiru Golang files were not changed."

      - name: "Set up Go"
        if: steps.check_nibiru_go.outputs.nibiru-go == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false # Repo go code is not used in this job.

      - name: "Install buf CLI"
        if: steps.check_nibiru_go.outputs.nibiru-go == 'true'
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.64.0

      - name: "Setup Node & npm (for npx)"
        if: steps.check_nibiru_go.outputs.nibiru-go == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "lts/jod" # Node v20

      - name: "Generate Rust proto bindings"
        if: steps.check_nibiru_go.outputs.nibiru-go == 'true'
        run: |
          bash proto/buf.gen.rs.sh

  cosmos-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: "Check for Go-related changes"
        id: check_changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            check_changes:
              - "lib/cosmos-sdk/**/*.go"
              - "lib/cosmos-sdk/go.mod"
              - "lib/cosmos-sdk/go.sum"
              - "lib/cosmos-sdk/**/*.proto"
              - "lib/cosmos-sdk/justfile"

      - name: skip-tests
        if: steps.check_changes.outputs.check_changes == 'false'
        run: |
          echo "job \"cosmos-sdk\" was skipped since relevant files were not changed."

      - name: "Set up Go"
        if: steps.check_changes.outputs.check_changes == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # cache: "The action has a built-in functionality for caching and
          # restoring go modules and build outputs. It uses [actions/cache@v4]."
          # - Handles go module cache (go env GOMODCACHE).
          # - Handles go build cache (go env GOCACHE).
          cache: true

      - name: "Install just"
        if: steps.check_changes.outputs.check_changes == 'true'
        # casey/just: https://just.systems/man/en/chapter_6.html
        # taiki-e/install-action: https://github.com/taiki-e/install-action
        uses: taiki-e/install-action@just

      - name: Run tests for lib/cosmos-sdk
        if: steps.check_changes.outputs.check_changes == 'true'
        working-directory: "lib/cosmos-sdk"
        run: |
          just test
