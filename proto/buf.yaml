version: v1
# Corresponds to Buf Schema Registry repo: https://buf.build/nibiru-chain/nibiru
name: buf.build/nibiru-chain/nibiru
deps:
  - buf.build/cosmos/cosmos-proto
  - buf.build/cosmos/cosmos-sdk:v0.47.11
  - buf.build/cosmos/gogo-proto
  - buf.build/googleapis/googleapis
breaking:
  # Breaking config docs:
  # https://buf.build/docs/breaking/usage/
  # https://buf.build/docs/configuration/v2/buf-yaml/
  use:
    - FILE
  # Depinject module config protos only. Keep all ignore lines; add one per module
  # when deleting nibiru/<module>/module/module.proto in depinject removal PRs.
  ignore:
    - nibiru/epochs/module/module.proto
    - nibiru/inflation/module/module.proto
    - nibiru/oracle/module/module.proto
    - nibiru/sudo/module/module.proto
    - nibiru/tokenfactory/module/module.proto
  # Allow Go generated-code package moves without treating them as proto API breaks.
  # Rule docs: https://buf.build/docs/breaking/rules/#file_same_go_package
  except:
    - FILE_SAME_GO_PACKAGE
lint:
  use:
    - DEFAULT
    - COMMENTS
    - FILE_LOWER_SNAKE_CASE
  except:
    - UNARY_RPC
    - COMMENT_FIELD
    - SERVICE_SUFFIX
    - PACKAGE_VERSION_SUFFIX
    - RPC_REQUEST_STANDARD_NAME
    - PACKAGE_DIRECTORY_MATCH

  ignore:
    - tendermint
